name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glances-monitor-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Send APK via Telegram
        if: ${{ secrets.TG_BOT_TOKEN != '' }}
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          CAPTION="📱 Glances Monitor v${VERSION} — сборка #${{ github.run_number }}&#10;Коммит: ${{ github.event.head_commit.message }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument" \
            -F "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -F "document=@build/app/outputs/flutter-apk/app-release.apk" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=HTML"
